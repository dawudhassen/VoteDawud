<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>VOTE DAWUD 203 — Are You Smart Enough?</title>

  <!-- Inline favicon (no extra request) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23c12e0d'/%3E%3Ctext x='50' y='68' font-family='Arial Black,sans-serif' font-size='52' font-weight='900' text-anchor='middle' fill='white'%3E203%3C/text%3E%3C/svg%3E">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #c12e0d;
      --accent: #ffffff;
      --gold: #ffd84d;
      --dark-red: #891e0e;
      --display: 'Bungee', system-ui, sans-serif;
      --body: 'Space Mono', ui-monospace, monospace;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
      -webkit-user-select: none;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    html, body {
      height: 100%;
      overscroll-behavior: none;
    }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: white;
      overflow: hidden;
      position: relative;
      min-height: 100vh;
      min-height: 100svh;
      min-height: 100dvh;
    }

    /* Subtle ambient drift — kept inside viewport bounds for cheaper compositing */
    body::before {
      content: '';
      position: fixed;
      inset: -25%;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 220, 100, 0.06), transparent 55%),
        radial-gradient(circle at 80% 70%, rgba(80, 16, 4, 0.18), transparent 60%),
        radial-gradient(circle at 50% 100%, rgba(80, 16, 4, 0.14), transparent 55%);
      animation: drift 22s ease-in-out infinite;
      z-index: 0;
      pointer-events: none;
      will-change: transform;
    }

    @keyframes drift {
      0%, 100% { transform: rotate(0deg) scale(1); }
      50% { transform: rotate(180deg) scale(1.25); }
    }

    .app {
      position: relative;
      width: 100%;
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      max-width: 600px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }

    /* ========== TOPBAR ========== */
    .topbar {
      padding: calc(1.4rem + env(safe-area-inset-top)) 1.5rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.85rem;
      max-height: 200px;
      transition: opacity 0.5s, transform 0.5s, max-height 0.5s, padding 0.5s;
      overflow: hidden;
    }

    .topbar.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(-20px);
      max-height: 0;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .progress {
      display: flex;
      gap: 0.45rem;
    }

    .progress-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.25);
      transition: background 0.4s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.4s;
    }

    .progress-dot.active {
      background: var(--accent);
      transform: scale(1.4);
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
    }

    .progress-dot.done {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(255, 216, 77, 0.65);
    }

    .tracker {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .tracker-label {
      font-family: var(--display);
      font-size: 0.85rem;
      letter-spacing: 0.15em;
      color: var(--accent);
      margin-right: 0.4rem;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.45);
    }

    .slot {
      width: 36px;
      height: 48px;
      border: 2px dashed rgba(255, 255, 255, 0.35);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      font-size: 1.7rem;
      color: var(--gold);
      transition: border-color 0.5s, background 0.5s, box-shadow 0.5s;
    }

    .slot.empty::before {
      content: '_';
      color: rgba(255, 255, 255, 0.32);
      transform: translateY(-6px);
      display: block;
    }

    .slot.filled {
      border: 2px solid var(--gold);
      background: rgba(255, 216, 77, 0.15);
      box-shadow: 0 0 24px rgba(255, 216, 77, 0.55), inset 0 0 12px rgba(255, 216, 77, 0.22);
      animation: slot-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slot-pop {
      0% { transform: scale(0.8); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    /* ========== STAGE / SCREENS ========== */
    .stage {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .screen.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* ========== INTRO ========== */
    .intro-tag {
      font-family: var(--body);
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.4em;
      color: var(--accent);
      margin-bottom: 1.2rem;
      animation: blink 2.4s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .intro-name {
      font-family: var(--display);
      font-size: clamp(3.8rem, 19vw, 7.5rem);
      line-height: 0.88;
      color: var(--accent);
      letter-spacing: -0.01em;
      text-align: center;
      filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.4));
      margin-bottom: 0.6rem;
    }

    .intro-name span {
      display: inline-block;
      animation: letter-drop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .intro-name span:nth-child(1) { animation-delay: 0.1s; }
    .intro-name span:nth-child(2) { animation-delay: 0.2s; }
    .intro-name span:nth-child(3) { animation-delay: 0.3s; }
    .intro-name span:nth-child(4) { animation-delay: 0.4s; }
    .intro-name span:nth-child(5) { animation-delay: 0.5s; }

    @keyframes letter-drop {
      from { transform: translateY(-120px) rotate(15deg); opacity: 0; }
      to { transform: translateY(0) rotate(0); opacity: 1; }
    }

    .intro-num {
      font-family: var(--display);
      font-size: clamp(0.9rem, 3.5vw, 1.2rem);
      color: var(--gold);
      letter-spacing: 0.3em;
      margin-bottom: 2.5rem;
      text-shadow: 0 0 20px rgba(255, 216, 77, 0.55);
      animation: fade-up 0.6s ease 0.7s backwards;
    }

    .intro-prompt {
      font-family: var(--body);
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 2.2rem;
      text-align: center;
      max-width: 300px;
      line-height: 1.55;
      animation: fade-up 0.6s ease 0.9s backwards;
    }

    .intro-prompt em {
      font-style: normal;
      color: var(--gold);
      font-weight: 700;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .start-btn {
      font-family: var(--display);
      font-size: 1.4rem;
      background: var(--accent);
      color: var(--dark-red);
      border: none;
      padding: 1.1rem 3rem;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 0.05em;
      animation: pulse-btn 1.5s ease-in-out infinite, fade-up 0.6s ease 1.1s backwards;
      transition: transform 0.15s;
      position: relative;
    }

    .start-btn:active { transform: scale(0.95); }

    @keyframes pulse-btn {
      0%, 100% {
        box-shadow:
          0 0 0 4px var(--bg),
          0 0 0 6px var(--accent),
          0 10px 40px rgba(0, 0, 0, 0.35);
      }
      50% {
        box-shadow:
          0 0 0 4px var(--bg),
          0 0 0 9px var(--accent),
          0 14px 60px rgba(255, 255, 255, 0.45);
      }
    }

    /* ========== QUESTION ========== */
    .qhint {
      font-family: var(--body);
      font-size: clamp(1.1rem, 4.6vw, 1.7rem);
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
      margin-bottom: 0.7rem;
      text-align: center;
      animation: fade-up 0.4s ease both;
    }

    .qnum {
      font-family: var(--display);
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.55);
      letter-spacing: 0.4em;
      margin-bottom: 1.4rem;
    }

    .question {
      font-family: var(--display);
      font-size: clamp(1.6rem, 6.8vw, 2.5rem);
      line-height: 1.15;
      text-align: center;
      margin-bottom: 2.4rem;
      max-width: 500px;
      color: var(--accent);
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      animation: fade-up 0.5s ease both;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
      width: 100%;
      max-width: 380px;
    }

    .option {
      font-family: var(--display);
      font-size: 1.6rem;
      background: rgba(137, 30, 14, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.28);
      color: var(--accent);
      padding: 1.5rem 0.5rem;
      border-radius: 18px;
      cursor: pointer;
      transition: transform 0.15s, background 0.2s, border-color 0.2s, box-shadow 0.2s;
      min-height: 92px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: fade-up 0.4s ease both;
    }

    .option:active {
      transform: scale(0.96);
      background: rgba(137, 30, 14, 0.75);
    }

    .option.wrong {
      animation: shake 0.45s, fade-out-wrong 0.6s 0.2s forwards;
      border-color: #2a0808;
      background: rgba(42, 8, 8, 0.7);
      color: #ffb8b0;
    }

    @keyframes fade-out-wrong {
      to { opacity: 0.4; }
    }

    .option.correct {
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      border-color: var(--gold);
      background: rgba(255, 216, 77, 0.28);
      color: var(--gold);
      box-shadow: 0 0 50px rgba(255, 216, 77, 0.7);
    }

    .option.faded {
      opacity: 0.15;
      filter: blur(2px);
      transition: opacity 0.4s, filter 0.4s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-12px); }
      60% { transform: translateX(12px); }
      80% { transform: translateX(-6px); }
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1.05); }
    }

    .reaction {
      position: absolute;
      font-family: var(--display);
      font-size: 1.2rem;
      color: #ffb8b0;
      pointer-events: none;
      animation: reaction-fly 0.8s ease forwards;
      z-index: 5;
    }

    @keyframes reaction-fly {
      0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
      30% { transform: translate(-50%, -20px) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -60px) scale(0.8); opacity: 0; }
    }

    /* ========== REVEAL ========== */
    #screen-reveal {
      align-items: center;
      justify-content: center;
    }

    .reveal-num {
      font-family: var(--display);
      font-size: 60vmin;
      line-height: 1;
      color: var(--accent);
      text-shadow:
        0 0 30px rgba(255, 216, 77, 0.85),
        0 0 60px rgba(255, 216, 77, 0.55),
        0 0 120px rgba(255, 216, 77, 0.4);
      position: relative;
    }

    .reveal-num.go {
      animation: reveal-num 1.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes reveal-num {
      0% { transform: scale(0) rotate(-180deg); opacity: 0; }
      35% { transform: scale(1.3) rotate(0deg); opacity: 1; }
      50% { transform: scale(1) rotate(0deg); }
      62% { transform: scale(1.12) rotate(0deg); }
      75% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(0.4) translateY(-40vh) rotate(0deg); opacity: 0; }
    }

    .particle {
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      pointer-events: none;
      top: 50%;
      left: 50%;
      will-change: transform, opacity;
    }

    /* ========== FINALE ========== */
    #screen-finale {
      padding: 0;
      background: var(--bg);
      overflow: hidden;
    }

    /* When finale is active, hide the body gradient entirely for clean reds */
    body.finale-active::before {
      display: none;
    }

    .poster-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center;
      z-index: 0;
      opacity: 0;
      transform: scale(1.06);
      transition: opacity 1.4s cubic-bezier(0.22, 1, 0.36, 1), transform 2.4s cubic-bezier(0.22, 1, 0.36, 1);
      background: var(--bg);
    }

    .poster-bg.show {
      opacity: 1;
      transform: scale(1);
    }

    #fireworks {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
      mix-blend-mode: screen;
    }

    .finale-content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      pointer-events: none;
    }

    .finale-msg {
      font-family: var(--display);
      font-size: clamp(1.5rem, 7vw, 2.5rem);
      color: var(--accent);
      line-height: 1.25;
      max-width: 480px;
      text-shadow:
        0 2px 12px rgba(0, 0, 0, 0.55),
        0 0 30px rgba(0, 0, 0, 0.4);
      transition: opacity 0.8s ease, filter 0.8s ease, transform 0.8s ease;
      opacity: 0;
      filter: blur(0);
    }

    .finale-msg.show {
      animation: msg-enter 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes msg-enter {
      from { opacity: 0; transform: translateY(20px) scale(0.9); filter: blur(8px); }
      to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
    }

    .finale-msg.dissolve {
      opacity: 0;
      filter: blur(24px);
      transform: scale(0.85) translateY(-10px);
    }

    .finale-msg .gold { color: var(--gold); }

    /* Tiny visit counter — sits in bottom letterbox of finale page */
    .visit-counter {
      position: absolute;
      bottom: 8px;
      left: 0;
      right: 0;
      text-align: center;
      font-family: var(--body);
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: rgba(255, 255, 255, 0.55);
      text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
      z-index: 10;
      opacity: 0;
      transition: opacity 1.2s ease;
      pointer-events: none;
    }

    .visit-counter.visible { opacity: 1; }

    /* ========== SIGNATURE ========== */
    .sig {
      padding: 0.8rem 1rem 1.2rem;
      text-align: center;
      font-family: var(--body);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.4em;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
      z-index: 5;
      transition: opacity 0.6s;
    }

    .sig.hidden {
      opacity: 0;
      pointer-events: none;
      max-height: 0;
      padding: 0;
      overflow: hidden;
    }

    /* ========== FLASH ========== */
    .flash {
      position: fixed;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      z-index: 100;
    }

    .flash.fire { animation: flash 0.35s; }

    @keyframes flash {
      0%, 100% { opacity: 0; }
      30% { opacity: 0.85; }
    }

    /* ========== AUDIO TOGGLE ========== */
    .audio-toggle {
      position: fixed;
      top: calc(1rem + env(safe-area-inset-top));
      right: calc(1rem + env(safe-area-inset-right));
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: opacity 0.4s, transform 0.15s, color 0.2s, border-color 0.2s;
      opacity: 0;
      pointer-events: none;
    }

    .audio-toggle.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .audio-toggle:active { transform: scale(0.92); }

    .audio-toggle.muted {
      color: rgba(255, 255, 255, 0.4);
      border-color: rgba(255, 255, 255, 0.12);
    }

    /* Tiny screens */
    @media (max-height: 640px) {
      .intro-prompt { margin-bottom: 1.4rem; }
      .question { margin-bottom: 1.6rem; }
      .option { min-height: 78px; padding: 1.1rem 0.4rem; }
    }

    /* Performance hints — only on actively-animating elements */
    .intro-name span,
    .reveal-num,
    .poster-bg,
    .start-btn,
    .progress-dot,
    .slot.filled {
      will-change: transform, opacity;
    }

    /* Respect users who prefer reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      body::before { display: none; }
      .start-btn,
      .audio-toggle { animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="flash" id="flash"></div>

  <button class="audio-toggle" id="audioToggle" aria-label="Toggle music">
    <span id="audioIcon">🔊</span>
  </button>

  <div class="app">
    <!-- TOPBAR -->
    <div class="topbar hidden" id="topbar">
      <div class="progress">
        <div class="progress-dot" data-i="0"></div>
        <div class="progress-dot" data-i="1"></div>
        <div class="progress-dot" data-i="2"></div>
      </div>
      <div class="tracker">
        <span class="tracker-label">DAWUD</span>
        <div class="slot empty" data-i="0"></div>
        <div class="slot empty" data-i="1"></div>
        <div class="slot empty" data-i="2"></div>
      </div>
    </div>

    <!-- STAGE -->
    <div class="stage">
      <!-- Intro -->
      <div class="screen active" id="screen-intro">
        <div class="intro-tag">★ ELECTION 2026 ★</div>
        <h1 class="intro-name">
          <span>D</span><span>A</span><span>W</span><span>U</span><span>D</span>
        </h1>
        <div class="intro-num">FOR THE GREATER GOOD</div>
        <p class="intro-prompt">
          <em>3-question IQ test.</em><br>
          Pass it and earn the right<br>
          to vote for greatness.
        </p>
        <button class="start-btn" id="start">START →</button>
      </div>

      <!-- Question -->
      <div class="screen" id="screen-q">
        <div class="qhint" id="qhint"></div>
        <div class="qnum" id="qnum">QUESTION 1 / 3</div>
        <h2 class="question" id="qtext"></h2>
        <div class="options" id="opts"></div>
      </div>

      <!-- Reveal -->
      <div class="screen" id="screen-reveal">
        <div class="reveal-num" id="revealNum"></div>
      </div>

    <div class="sig" id="sig">DAWUD HASSEN · #203 · RAFFLES INSTITUTION</div>
  </div>

  <script>
  (() => {
    /* ============ DATA ============ */
    const QUESTIONS = [
      {
        hint: "easy one to start...",
        text: "How many shoes in a pair? 👟",
        options: ['47', '2', 'π', '🥐'],
        correctIndex: 1,
        answer: '2'
      },
      {
        hint: "trickier 👀",
        text: "Cookies in an EMPTY jar? 🍪",
        options: ['0', '7', '∞', 'yes'],
        correctIndex: 0,
        answer: '0'
      },
      {
        hint: "FINAL BOSS 💪",
        text: "How many sides on a △ ?",
        options: ['🌮', '100', '3', 'sphere'],
        correctIndex: 2,
        answer: '3'
      }
    ];

    const REACTIONS = ['nope', 'lmao no', 'huh?', 'wat', 'try again', 'bruh', 'not it', 'oof'];

    /* ============ STATE ============ */
    let currentQ = 0;
    let locked = false;

    /* ============ HELPERS ============ */
    const $ = id => document.getElementById(id);

    function showScreen(name) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $('screen-' + name).classList.add('active');
    }

    function vibrate(pattern) {
      if (navigator.vibrate) try { navigator.vibrate(pattern); } catch(e) {}
    }

    /* ============ INTRO → QUESTION ============ */
    $('start').addEventListener('click', () => {
      vibrate(40);
      startMusic();
      $('topbar').classList.remove('hidden');
      showQuestion();
    });

    /* ============ AUDIO ENGINE (procedural) ============ */
    const Audio = {
      ctx: null, master: null,
      started: false, muted: false, mode: 'playing',
      bpm: 124,

      init() {
        if (this.started) return;
        try {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (!AC) return;
          this.ctx = new AC();
          if (this.ctx.state === 'suspended') this.ctx.resume();
        } catch (e) { return; }

        this.master = this.ctx.createGain();
        this.master.gain.value = 0.4;

        const comp = this.ctx.createDynamicsCompressor();
        comp.threshold.value = -10;
        comp.ratio.value = 4;
        comp.attack.value = 0.005;
        comp.release.value = 0.1;
        this.master.connect(comp);
        comp.connect(this.ctx.destination);

        this._stepLen = (60 / this.bpm) / 4; // 16th note duration
        this._step = 0;
        this._nextTime = this.ctx.currentTime + 0.06;
        this.started = true;
        this._scheduler();
      },

      // ---- voices ----
      _kick(t, vol = 1) {
        const o = this.ctx.createOscillator(), g = this.ctx.createGain();
        o.frequency.setValueAtTime(160, t);
        o.frequency.exponentialRampToValueAtTime(40, t + 0.12);
        g.gain.setValueAtTime(0.9 * vol, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.18);
      },

      _snare(t, vol = 1) {
        // tonal body
        const o = this.ctx.createOscillator(), og = this.ctx.createGain();
        o.frequency.value = 200;
        og.gain.setValueAtTime(0.25 * vol, t);
        og.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
        o.connect(og); og.connect(this.master);
        o.start(t); o.stop(t + 0.1);
        // noise body
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.1, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const n = this.ctx.createBufferSource(); n.buffer = buf;
        const f = this.ctx.createBiquadFilter();
        f.type = 'highpass'; f.frequency.value = 1200;
        const ng = this.ctx.createGain();
        ng.gain.setValueAtTime(0.35 * vol, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
        n.connect(f); f.connect(ng); ng.connect(this.master);
        n.start(t); n.stop(t + 0.12);
      },

      _hat(t, vol = 1, open = false) {
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 0.15, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
        const n = this.ctx.createBufferSource(); n.buffer = buf;
        const f = this.ctx.createBiquadFilter();
        f.type = 'highpass'; f.frequency.value = 8000;
        const ng = this.ctx.createGain();
        const dur = open ? 0.18 : 0.04;
        ng.gain.setValueAtTime(0.16 * vol, t);
        ng.gain.exponentialRampToValueAtTime(0.001, t + dur);
        n.connect(f); f.connect(ng); ng.connect(this.master);
        n.start(t); n.stop(t + dur + 0.02);
      },

      _bass(freq, t, dur = 0.25, vol = 1) {
        const o = this.ctx.createOscillator();
        o.type = 'sawtooth'; o.frequency.value = freq;
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.setValueAtTime(900, t);
        f.frequency.exponentialRampToValueAtTime(220, t + dur);
        f.Q.value = 4;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.4 * vol, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(f); f.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + dur + 0.02);
      },

      _stab(freqs, t, dur = 0.18, vol = 1) {
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.22 * vol, t + 0.005);
        g.gain.linearRampToValueAtTime(0.13 * vol, t + 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass'; f.frequency.value = 2200; f.Q.value = 1.5;
        g.connect(f); f.connect(this.master);
        freqs.forEach(freq => {
          const o = this.ctx.createOscillator();
          o.type = 'sawtooth'; o.frequency.value = freq;
          o.connect(g); o.start(t); o.stop(t + dur + 0.02);
        });
      },

      _lead(freq, t, dur = 0.2, vol = 1) {
        const o = this.ctx.createOscillator();
        o.type = 'square'; o.frequency.value = freq;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.11 * vol, t + 0.008);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + dur + 0.02);
      },

      // ---- main scheduler ----
      _scheduler() {
        if (!this.started) return;
        while (this._nextTime < this.ctx.currentTime + 0.15) {
          this._scheduleStep(this._step, this._nextTime);
          this._step = (this._step + 1) % 64; // 4 bars × 16 steps
          this._nextTime += this._stepLen;
        }
        setTimeout(() => this._scheduler(), 25);
      },

      _scheduleStep(step, t) {
        const bar = Math.floor(step / 16);
        const six = step % 16;

        // Drums --------
        if (six === 0 || six === 8) this._kick(t);
        if (this.mode === 'finale' && six === 6) this._kick(t, 0.5);
        if (six === 4 || six === 12) this._snare(t);
        if (six % 2 === 0) {
          const accent = six === 0 || six === 8;
          this._hat(t, accent ? 1.3 : 0.7);
        }
        // open hat fill at end of every 4 bars
        if (bar === 3 && six === 14) this._hat(t, 1.3, true);

        // Chord progression: Am - F - G - Am (i-VI-VII-i, heroic)
        const chords = [
          { name: 'Am', root: 110, stab: [220, 261.63, 329.63] },
          { name: 'F',  root: 87.31, stab: [174.61, 220, 261.63] },
          { name: 'G',  root: 98, stab: [196, 246.94, 293.66] },
          { name: 'Am', root: 110, stab: [220, 261.63, 329.63] },
        ];
        const c = chords[bar];

        // Bass: root pump pattern
        if (six === 0)  this._bass(c.root, t, 0.35);
        if (six === 6)  this._bass(c.root, t, 0.12, 0.6);
        if (six === 8)  this._bass(c.root * 1.5, t, 0.35); // fifth up
        if (six === 12) this._bass(c.root, t, 0.25);

        // Stabs: classic rock syncopation "DUH-duh DUH-duh"
        if (six === 0 || six === 2 || six === 8 || six === 10) {
          this._stab(c.stab, t, 0.16);
        }

        // Lead melody (finale only) — ascending arpeggios per chord
        if (this.mode === 'finale') {
          const melodies = [
            // Am: A C E A
            [{s:0,f:440},{s:4,f:523.25},{s:8,f:659.25},{s:12,f:880}],
            // F: F A C F
            [{s:0,f:349.23},{s:4,f:440},{s:8,f:523.25},{s:12,f:698.46}],
            // G: G B D G
            [{s:0,f:392},{s:4,f:493.88},{s:8,f:587.33},{s:12,f:783.99}],
            // Am climax: A C E A↑
            [{s:0,f:440},{s:4,f:523.25},{s:8,f:659.25},{s:12,f:1046.5}],
          ];
          const note = melodies[bar].find(n => n.s === six);
          if (note) this._lead(note.f, t, 0.32, 1.4);
        }
      },

      // ---- one-shots ----
      riser() {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(110, t);
        o.frequency.exponentialRampToValueAtTime(880, t + 0.45);
        const f = this.ctx.createBiquadFilter();
        f.type = 'lowpass';
        f.frequency.setValueAtTime(400, t);
        f.frequency.exponentialRampToValueAtTime(6000, t + 0.45);
        f.Q.value = 6;
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.12, t + 0.3);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
        o.connect(f); f.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.6);
      },

      sting() {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        // crash cymbal
        const buf = this.ctx.createBuffer(1, this.ctx.sampleRate * 1.4, this.ctx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < d.length; i++) {
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.6);
        }
        const n = this.ctx.createBufferSource(); n.buffer = buf;
        const hf = this.ctx.createBiquadFilter();
        hf.type = 'highpass'; hf.frequency.value = 5000;
        const cg = this.ctx.createGain();
        cg.gain.setValueAtTime(0.35, t);
        cg.gain.exponentialRampToValueAtTime(0.001, t + 1.2);
        n.connect(hf); hf.connect(cg); cg.connect(this.master);
        n.start(t);
        // power-chord triumphant blast (A power chord + octave)
        [110, 165, 220, 440].forEach(freq => {
          const o = this.ctx.createOscillator();
          o.type = 'sawtooth'; o.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.18, t + 0.015);
          g.gain.linearRampToValueAtTime(0.1, t + 0.3);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
          o.connect(g); g.connect(this.master);
          o.start(t); o.stop(t + 0.95);
        });
        // accent kick
        this._kick(t, 1.2);
      },

      errorBuzz() {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        const o = this.ctx.createOscillator();
        o.type = 'square';
        o.frequency.setValueAtTime(220, t);
        o.frequency.linearRampToValueAtTime(110, t + 0.2);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.1, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.25);
      },

      finaleBoom() {
        if (!this.started) return;
        const t = this.ctx.currentTime;
        // sub-bass drop
        const o = this.ctx.createOscillator();
        o.frequency.setValueAtTime(80, t);
        o.frequency.exponentialRampToValueAtTime(28, t + 0.5);
        const g = this.ctx.createGain();
        g.gain.setValueAtTime(0.55, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
        o.connect(g); g.connect(this.master);
        o.start(t); o.stop(t + 0.8);
        // big sting on top
        setTimeout(() => this.sting(), 80);
      },

      setMode(m) { this.mode = m; },

      setMuted(m) {
        this.muted = m;
        if (this.master) this.master.gain.value = m ? 0 : 0.4;
      }
    };

    function startMusic() {
      Audio.init();
      $('audioToggle').classList.add('visible');
    }

    $('audioToggle').addEventListener('click', () => {
      Audio.setMuted(!Audio.muted);
      $('audioIcon').textContent = Audio.muted ? '🔇' : '🔊';
      $('audioToggle').classList.toggle('muted', Audio.muted);
      vibrate(20);
    });

    // Pause audio when tab is hidden — saves battery on mobile
    document.addEventListener('visibilitychange', () => {
      if (!Audio.started || !Audio.ctx) return;
      if (document.hidden) {
        Audio.ctx.suspend().catch(() => {});
      } else if (!Audio.muted) {
        Audio.ctx.resume().catch(() => {});
      }
    });

    function showQuestion() {
      const q = QUESTIONS[currentQ];
      $('qhint').textContent = q.hint;
      $('qnum').textContent = `QUESTION ${currentQ + 1} / 3`;
      $('qtext').textContent = q.text;

      // Re-trigger animations
      ['qhint', 'qnum', 'qtext'].forEach(id => {
        const el = $(id);
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });

      const opts = $('opts');
      opts.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = opt;
        btn.style.animationDelay = `${0.15 + i * 0.08}s`;
        btn.addEventListener('click', () => handleAnswer(btn, i, q.correctIndex));
        opts.appendChild(btn);
      });

      // Progress dots
      document.querySelectorAll('.progress-dot').forEach((d, i) => {
        d.classList.remove('active', 'done');
        if (i < currentQ) d.classList.add('done');
        else if (i === currentQ) d.classList.add('active');
      });

      locked = false;
      Audio.riser();
      showScreen('q');
    }

    function handleAnswer(btn, chosen, correct) {
      if (locked) return;

      if (chosen !== correct) {
        btn.classList.add('wrong');
        vibrate(80);
        Audio.errorBuzz();
        spawnReaction(btn);
        setTimeout(() => btn.classList.remove('wrong'), 700);
        return;
      }

      // Correct!
      locked = true;
      btn.classList.add('correct');
      Audio.sting();
      // Fade out the rest
      [...document.querySelectorAll('.option')].forEach(o => {
        if (o !== btn) o.classList.add('faded');
      });
      vibrate([20, 40, 80]);
      setTimeout(() => revealNumber(QUESTIONS[currentQ].answer), 650);
    }

    function spawnReaction(btn) {
      const r = document.createElement('div');
      r.className = 'reaction';
      r.textContent = REACTIONS[Math.floor(Math.random() * REACTIONS.length)];
      const rect = btn.getBoundingClientRect();
      const stage = $('screen-q');
      const stageRect = stage.getBoundingClientRect();
      r.style.left = (rect.left + rect.width / 2 - stageRect.left) + 'px';
      r.style.top = (rect.top - stageRect.top) + 'px';
      stage.appendChild(r);
      setTimeout(() => r.remove(), 900);
    }

    /* ============ NUMBER REVEAL ============ */
    function revealNumber(num) {
      const el = $('revealNum');
      el.textContent = num;
      el.classList.remove('go');
      void el.offsetWidth;
      el.classList.add('go');

      showScreen('reveal');

      // Flash
      $('flash').classList.remove('fire');
      void $('flash').offsetWidth;
      $('flash').classList.add('fire');

      // Particle burst
      spawnParticles();

      // After reveal animation, fill the slot
      setTimeout(() => {
        const slot = document.querySelector(`.slot[data-i="${currentQ}"]`);
        slot.classList.remove('empty');
        slot.textContent = num;
        slot.classList.add('filled');

        document.querySelectorAll('.progress-dot')[currentQ].classList.add('done');
        document.querySelectorAll('.progress-dot')[currentQ].classList.remove('active');

        currentQ++;
        if (currentQ < QUESTIONS.length) {
          setTimeout(showQuestion, 700);
        } else {
          setTimeout(showFinale, 700);
        }
      }, 1700);
    }

    function spawnParticles() {
      const colors = ['#ffd84d', '#ffffff', '#ffe680', '#fff5e8', '#ffd700'];
      const stage = $('screen-reveal');
      const count = 36;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.background = colors[i % colors.length];
        p.style.boxShadow = `0 0 14px ${colors[i % colors.length]}`;
        const angle = (i / count) * Math.PI * 2 + Math.random() * 0.4;
        const dist = 140 + Math.random() * 240;
        const dx = Math.cos(angle) * dist;
        const dy = Math.sin(angle) * dist;
        p.style.transition = 'transform 1.3s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.3s ease-out';
        stage.appendChild(p);
        requestAnimationFrame(() => {
          p.style.transform = `translate(${dx}px, ${dy}px) scale(${0.2 + Math.random() * 0.7})`;
          p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 1400);
      }
    }

    /* ============ FINALE ============ */
    function showFinale() {
      showScreen('finale');
      $('topbar').classList.add('hidden');
      $('sig').classList.add('hidden');
      document.body.classList.add('finale-active');
      vibrate([100, 50, 100, 50, 200, 50, 100]);
      Audio.setMode('finale');
      Audio.finaleBoom();

      startFireworks();

      const msg = $('finalemsg');
      const poster = $('posterBg');

      // Stage 1: "Wow, an IQ too high?"
      setTimeout(() => {
        msg.innerHTML = 'Wow, an IQ too high?';
        msg.classList.remove('dissolve');
        msg.classList.add('show');
      }, 500);

      // Stage 2: dissolve after ~3 seconds
      setTimeout(() => {
        msg.classList.remove('show');
        msg.classList.add('dissolve');
      }, 3500);

      // Stage 3: "Now prove it..."
      setTimeout(() => {
        msg.classList.remove('dissolve');
        msg.innerHTML = 'Now prove it.<br>Vote <span class="gold">DAWUD (203)</span><br>for the greater good!';
        msg.style.animation = 'none';
        void msg.offsetWidth;
        msg.style.animation = '';
        msg.classList.add('show');
      }, 4400);

      // Stage 4: poster reveals — message dissolves to make way
      setTimeout(() => {
        msg.classList.remove('show');
        msg.classList.add('dissolve');
      }, 7400);

      // Stage 5: poster fades in dramatically
      setTimeout(() => {
        poster.classList.add('show');
        Audio.sting();
        celebrateBurst();
        vibrate([60, 40, 60, 40, 120]);
      }, 8000);

      // Stage 6: tiny counter fades in last, after poster has settled
      bumpCounter();
    }

    // Fetch and display total finale completions via counterapi.dev
    async function bumpCounter() {
      try {
        const r = await fetch('https://api.counterapi.dev/v1/dawud203/finale/up', {
          cache: 'no-store'
        });
        if (!r.ok) return;
        const data = await r.json();
        const n = data && (data.value ?? data.count);
        if (typeof n !== 'number' || n < 1) return;
        const label = n === 1 ? 'GENIUS' : 'GENIUSES';
        const el = $('visitCounter');
        el.textContent = `★ ${n.toLocaleString()} ${label} PASSED ★`;
        // Show after poster has fully revealed (~10s into finale)
        setTimeout(() => el.classList.add('visible'), 9500);
      } catch (e) {
        // Counter is non-critical — fail silently if API is offline
      }
    }

    /* ============ FIREWORKS ============ */
    let fwActive = false;
    let fwParticles = [];
    let _explode = null;
    function startFireworks() {
      const canvas = $('fireworks');
      const ctx = canvas.getContext('2d');

      function resize() {
        const dpr = window.devicePixelRatio || 1;
        canvas.width = canvas.offsetWidth * dpr;
        canvas.height = canvas.offsetHeight * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      resize();
      window.addEventListener('resize', resize);

      const W = () => canvas.offsetWidth;
      const H = () => canvas.offsetHeight;

      // White firework palette — pure white with subtle warm sparkle variations
      const fwColors = ['#ffffff', '#fffaf0', '#fff8e8', '#fff0e0', '#ffffff', '#ffffff'];
      const MAX_PARTICLES = (navigator.hardwareConcurrency || 4) < 4 ? 200 : 400;

      function explode(x, y, big = false) {
        if (fwParticles.length > MAX_PARTICLES) return;
        const color = fwColors[Math.floor(Math.random() * fwColors.length)];
        const count = big ? 50 : 28 + Math.floor(Math.random() * 14);
        for (let i = 0; i < count; i++) {
          const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.3;
          const speed = (big ? 2.4 : 1.6) + Math.random() * (big ? 3 : 2.2);
          fwParticles.push({
            x, y, prevX: x, prevY: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1,
            color,
            size: 1 + Math.random() * 1.6,
            decay: 0.0065 + Math.random() * 0.005
          });
        }
      }

      function spawnEmber() {
        if (fwParticles.length > MAX_PARTICLES) return;
        fwParticles.push({
          x: Math.random() * W(),
          y: H() + 8,
          prevX: 0, prevY: 0,
          vx: (Math.random() - 0.5) * 0.25,
          vy: -0.35 - Math.random() * 0.45,
          life: 0.7 + Math.random() * 0.4,
          color: fwColors[Math.floor(Math.random() * fwColors.length)],
          size: 0.5 + Math.random(),
          decay: 0.003,
          isEmber: true
        });
      }

      function tick() {
        if (!fwActive) return;
        // With screen blend mode on canvas, we fade alpha not luminance
        ctx.save();
        ctx.globalCompositeOperation = 'destination-out';
        ctx.fillStyle = 'rgba(0, 0, 0, 0.16)';
        ctx.fillRect(0, 0, W(), H());
        ctx.restore();

        // Ambient embers drifting upward
        if (Math.random() < 0.2) spawnEmber();

        // Set shadow once for all particles (screen blend provides additional glow)
        ctx.shadowColor = '#ffffff';
        ctx.shadowBlur = 8;

        for (let i = fwParticles.length - 1; i >= 0; i--) {
          const p = fwParticles[i];
          p.prevX = p.x;
          p.prevY = p.y;
          p.x += p.vx;
          p.y += p.vy;

          if (!p.isEmber) {
            p.vy += 0.04; // gentler gravity
            p.vx *= 0.985;
            p.vy *= 0.985;
          }

          p.life -= p.decay;

          if (p.life <= 0 || p.y < -30 || p.y > H() + 60) {
            fwParticles.splice(i, 1);
            continue;
          }

          const alpha = Math.max(0, Math.min(1, p.life));
          ctx.globalAlpha = alpha;

          // Streak rendering for explosion particles (motion blur)
          if (!p.isEmber) {
            ctx.strokeStyle = p.color;
            ctx.lineWidth = p.size * 0.7;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(p.prevX, p.prevY);
            ctx.lineTo(p.x, p.y);
            ctx.stroke();
          }

          // Glowing head
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;

        requestAnimationFrame(tick);
      }

      fwActive = true;
      _explode = explode;

      // Initial cascade — slower, more deliberate
      for (let i = 0; i < 4; i++) {
        setTimeout(() => {
          explode(W() * (0.2 + Math.random() * 0.6), H() * (0.22 + Math.random() * 0.4), i === 0);
        }, i * 350);
      }

      // Continuous fireworks — slower pace, more breathing room
      setInterval(() => {
        if (!fwActive) return;
        if (Math.random() > 0.35) {
          explode(W() * (0.15 + Math.random() * 0.7), H() * (0.18 + Math.random() * 0.45));
        }
      }, 950);

      tick();
    }

    function celebrateBurst() {
      if (!_explode) return;
      const canvas = $('fireworks');
      const W = canvas.offsetWidth;
      const H = canvas.offsetHeight;
      for (let i = 0; i < 4; i++) {
        setTimeout(() => {
          _explode(W * (0.2 + Math.random() * 0.6), H * (0.2 + Math.random() * 0.4), true);
        }, i * 180);
      }
    }
  })();
  </script>
</body>
</html>
